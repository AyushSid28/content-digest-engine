<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Summarise Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f; color: #e0e0e0;
      padding: 20px; width: 340px;
    }
    h2 { font-size: 16px; margin-bottom: 14px; color: #fff; }
    label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; margin-top: 12px; }
    input, select {
      width: 100%; padding: 8px 10px; border-radius: 6px;
      border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; font-size: 13px;
    }
    .btn-row { display: flex; gap: 8px; margin-top: 16px; }
    button {
      flex: 1; padding: 8px 12px; border-radius: 6px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .save { background: #2563eb; color: white; }
    .save:hover { background: #1d4ed8; }
    .open-panel { background: #333; color: #e0e0e0; }
    .open-panel:hover { background: #444; }
    .msg { font-size: 12px; margin-top: 10px; color: #22c55e; display: none; }
    .msg.error { color: #ef4444; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .status-dot.ok { background: #22c55e; }
    .status-dot.missing { background: #ef4444; }
    .key-status { font-size: 12px; margin-top: 8px; color: #aaa; }
  </style>
</head>
<body>
  <h2>Summarise Settings</h2>

  <label for="apiKey">Groq API Key</label>
  <input type="password" id="apiKey" placeholder="gsk_...">

  <label for="provider">Provider</label>
  <select id="provider">
    <option value="groq">Groq (free)</option>
    <option value="openai">OpenAI</option>
  </select>

  <label for="theme">Theme</label>
  <select id="theme">
    <option value="default">Default</option>
    <option value="minimal">Minimal</option>
    <option value="detailed">Detailed</option>
    <option value="bullet-points">Bullet Points</option>
  </select>

  <div class="key-status" id="keyStatus"></div>

  <div class="btn-row">
    <button class="save" id="saveBtn">Save</button>
    <button class="open-panel" id="panelBtn">Open Panel</button>
  </div>

  <div class="msg" id="msg">Settings saved!</div>

  <script src="settings.js"></script>
</body>
</html>
