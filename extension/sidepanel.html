<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Summarise</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Summarise</h1>
      <button id="summarise-btn" class="btn-primary">Summarise this page</button>
    </div>

    <div id="page-info" class="page-info"></div>
    <div id="status" class="status"></div>
    <div id="output" class="output"></div>

    </div>
  </div>

  <script src="sidepanel.js"></script>
